name: Fetch & Save Hello World

on:
  schedule:
    - cron: '0 * * * *'   # mỗi 1 giờ
  workflow_dispatch:        # chạy thủ công trên GitHub UI

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run fetch script
        run: python fetch.py

      - name: Commit & push DB
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add katalot.db
          git diff --staged --quiet || git commit -m "chore: update katalot.db [skip ci]"
          git push
